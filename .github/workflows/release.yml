name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev
        env:
          NODE_ENV: development

      - name: Run validation checks
        run: npm run test:all

      - name: Install Flatpak build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder rpm
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08 org.electronjs.Electron2.BaseApp//24.08

      - name: Build Linux x64 packages
        run: npm run build:linux:x64

      - name: Build Linux ARM64 packages
        run: npm run build:linux:arm64

      - name: Build Linux x64 RPM package
        run: npm run build:rpm:x64

      - name: Build Linux ARM64 RPM package
        run: npm run build:rpm:arm64

      - name: Build Flatpak package
        run: npm run build:flatpak

      - name: Generate artifact checksums
        run: npm run checksums

      - name: Validate release artifacts
        run: |
          test -n "$(find dist -maxdepth 1 -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.flatpak' \) -print -quit)"
          test -n "$(find dist -maxdepth 1 -type f -name '*.sha256' -print -quit)"
          cd dist
          sha256sum --check *.sha256

      - name: Generate release notes
        run: node scripts/generate-release-notes.js release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.flatpak
            dist/*.sha256
